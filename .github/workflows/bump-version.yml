name: Auto Increment Version
on:
  push:
    branches: [ main ]
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Increment Version
        run: |
          # index.htmlから現在のVer x.y.zを抽出
          CURRENT_VER=$(grep -oP 'Ver \K[0-9]+\.[0-9]+\.[0-9]+' index.html)
          # zの部分を分解してインクリメント
          IFS='.' read -ra ADDR <<< "$CURRENT_VER"
          NEW_VER="${ADDR[0]}.${ADDR[1]}.$((ADDR[2] + 1))"
          # ファイル書き換え
          sed -i "s/Ver $CURRENT_VER/Ver $NEW_VER/g" index.html
          echo "NEW_VERSION=$NEW_VER" >> $GITHUB_ENV
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # GITHUB_TOKENを使用する場合、自動的にループ防止が行われるため [skip ci] は必須ではないが念のため付与
          git commit -m "chore: increment version to ${{ env.NEW_VERSION }} [skip ci]"
          git push
