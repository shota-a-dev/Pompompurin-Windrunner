# .github/workflows/deploy.yml
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # mainブランチにpushされたら実行

permissions:
  contents: write # タグを作成・プッシュするために write 権限が必要
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 を指定するとタグを含む完全な履歴を取得します（git describe でタグを参照するため）
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Viteが書き出すフォルダを指定

  create-tag:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push semantic patch tag (x.y.z)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # タグ情報を最新まで取得
          git fetch --tags

          # 直近のタグを取得（フォールバックは v0.0.0）
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $latest_tag"

          # 先頭の 'v' を取り除く
          ver=${latest_tag#v}

          # x.y.z 形式でない場合はフォールバック
          if [[ ! $ver =~ ^[0-9]+(\.[0-9]+){2}$ ]]; then
            echo "Latest tag does not match x.y.z format. Falling back to v0.0.0"
            ver="0.0.0"
          fi

          IFS='.' read -r major minor patch <<<"$ver"
          new_patch=$((patch + 1))
          new_tag="v${major}.${minor}.${new_patch}"
          echo "New tag: $new_tag"

          # すでに同名タグが存在すればスキップ
          if git rev-parse "$new_tag" >/dev/null 2>&1; then
            echo "Tag $new_tag already exists. Skipping tag creation."
            exit 0
          fi

          # タグ作成とプッシュ
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # token を使って authenticated push を行う
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}
          git tag $new_tag
          git push origin $new_tag

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: create-tag
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4