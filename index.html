<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <title>ポムランナー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap" rel="stylesheet">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ポムランナー">
  <link rel="apple-touch-icon" href="assets/image/sprites/player.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #FFFDEB;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      margin: 0 auto;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="game-container">
    <!-- UI Layer -->
    <div id="ui-layer" class="absolute inset-0 pointer-events-none text-[#5E3A21] z-[100] hidden">
      <div class="absolute top-4 left-4 bg-white/95 px-6 py-2 rounded-2xl shadow-md border-4 border-[#FDE047]">
        <p class="text-sm font-black opacity-60 leading-none mb-1">SCORE</p>
        <p id="currentScore" class="text-3xl font-black leading-none">0</p>
      </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-[#87CEEB]/80 backdrop-blur-sm z-[300] transition-opacity duration-500">
      <!-- Version表記 (スタート画面内・右上) -->
      <div class="absolute top-4 right-4 text-[10px] font-bold text-[#5E3A21]/40 pointer-events-none">Ver 1.0.4</div>
      
      <div class="bg-white p-6 rounded-[2.5rem] shadow-2xl text-center border-8 border-[#FDE047] max-w-sm w-11/12">
        <h1 class="text-3xl font-black text-[#5E3A21] mb-2 tracking-tighter">ポムランナー</h1>
        <p class="text-lg font-bold mb-4 text-[#5E3A21]">BEST SCORE: <span id="startBestScore" class="text-orange-500">0</span></p>
        <div class="flex flex-col gap-3">
          <button id="start-btn" class="bg-[#FDE047] text-[#5E3A21] text-xl font-black py-4 px-12 rounded-full shadow-[0_8px_0_#D4B106] hover:translate-y-1 active:translate-y-2 transition-all pointer-events-auto">あそぶ！</button>
          <button id="collection-btn" class="bg-white text-[#5E3A21] text-sm font-black py-2 px-8 rounded-full border-4 border-[#FDE047] shadow-md hover:bg-[#FFFDEB] transition-all pointer-events-auto">コレクション</button>
        </div>
        <div class="mt-6">
          <button id="reset-best-btn" class="text-[#5E3A21]/60 text-sm font-bold underline decoration-dotted pointer-events-auto">スコアをリセットする</button>
        </div>
      </div>
    </div>

    <!-- Collection Screen -->
    <div id="collection-screen" class="absolute inset-0 flex flex-col bg-[#FFFDEB]/98 backdrop-blur-md z-[1000] hidden overflow-hidden px-8 sm:px-16 py-0">
      <div class="w-full max-w-5xl mx-auto h-full flex flex-col p-4">
        <!-- 1行目: ヘッダー (高さを抑えて上に寄せる) -->
        <div class="flex justify-between items-center mb-4 border-b-2 border-[#FDE047] pb-2">
          <div class="flex items-center gap-4">
            <h2 class="text-2xl font-black text-[#5E3A21]">たからもの</h2>
            <!-- テスト用リセットボタン -->
            <button id="reset-collection-btn" class="text-[10px] bg-red-100 text-red-500 px-2 py-1 rounded-md font-bold border border-red-200 pointer-events-auto hover:bg-red-200 transition-colors">リセット</button>
          </div>
          <div class="bg-white px-4 py-1.5 rounded-xl border-4 border-[#FDE047] flex items-center gap-2 shadow-sm">
            <img src="assets/image/sprites/coin.png" class="w-6 h-6 object-contain" alt="coin">
            <span id="collectionTotalCoins" class="text-xl font-black text-[#5E3A21]">0</span>
          </div>
        </div>

        <!-- 2行目: コレクションリスト (1行4列固定・スクロール領域) -->
        <div class="flex-1 overflow-y-auto mb-4 pr-1 custom-scrollbar">
          <div id="collectionGrid" class="grid grid-cols-4 gap-3">
            <!-- アイテムが生成される -->
          </div>
        </div>

        <!-- 3行目: もどるボタン (サイズを適切に縮小) -->
        <div class="flex justify-center pb-2">
          <button id="close-collection-btn" class="bg-[#5E3A21] text-white text-base font-black py-2.5 px-12 rounded-full shadow-[0_4px_0_#3D2612] hover:translate-y-0.5 active:translate-y-1 transition-all pointer-events-auto">もどる</button>
        </div>
      </div>

      <!-- 全画面プレビューオーバーレイ (たからものをタップした時に表示) -->
      <div id="item-preview-overlay" class="absolute inset-0 bg-black/90 backdrop-blur-md z-[1100] flex flex-col items-center hidden opacity-0 transition-opacity duration-300 pointer-events-auto p-6">
        <!-- 画像エリア (比率: 7.5) -->
        <div class="h-[75%] w-full flex items-center justify-center">
          <img id="previewImage" src="" class="max-w-full max-h-full object-contain drop-shadow-[0_0_40px_rgba(253,224,71,0.6)] animate-in zoom-in duration-500">
        </div>
        <!-- テキスト情報エリア (比率: 2.5 / 縮小禁止) -->
        <div class="h-[25%] flex-shrink-0 w-full max-w-md flex flex-col items-center justify-center text-center animate-in slide-in-from-bottom-4 duration-500">
          <h3 id="previewName" class="text-3xl font-black text-white mb-2 tracking-tight">アイテム名</h3>
          <p id="previewDesc" class="text-sm text-white/60 leading-relaxed px-4 line-clamp-3">説明文がここに入ります。</p>
        </div>
      </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-500 z-[400] hidden">
      <div class="bg-white p-6 rounded-[3rem] shadow-2xl text-center border-8 border-[#5E3A21] w-11/12 max-w-2xl flex flex-row items-center justify-center gap-8">
        <div class="flex-shrink-0">
          <img id="resultImage" src="" alt="Result" class="w-64 h-64 object-contain mx-auto">
        </div>
        <div class="flex flex-col items-center">
          <h2 id="resultTitle" class="text-2xl font-black mb-2 text-red-500">GAME OVER</h2>
          <div class="mb-4">
            <p class="text-gray-500 font-bold mb-0 uppercase tracking-widest text-[10px]">Final Score</p>
            <p id="finalScore" class="text-5xl font-black text-orange-500">0</p>
          </div>
          <!-- 統計情報エリア -->
          <div class="grid grid-cols-3 gap-4 mb-6 w-full bg-[#FFFDEB] p-4 rounded-2xl border-4 border-[#5E3A21]/10">
            <div>
              <p class="text-[10px] font-bold opacity-60">距離</p>
              <p class="text-lg font-black"><span id="resultDistance">0</span>m</p>
            </div>
            <div>
              <p class="text-[10px] font-bold opacity-60">コイン</p>
              <p class="text-lg font-black text-yellow-600"><span id="resultCoins">0</span></p>
            </div>
            <div>
              <p class="text-[10px] font-bold opacity-60">倒した敵</p>
              <p class="text-lg font-black text-red-500"><span id="resultEnemies">0</span></p>
            </div>
          </div>
          <button id="retry-btn" class="bg-[#FDE047] text-[#5E3A21] text-lg font-black py-3 px-10 rounded-full shadow-[0_6px_0_#D4B106] hover:translate-y-1 active:translate-y-2 transition-all pointer-events-auto">もういちど遊ぶ</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
