<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>ポムポムプリン・ウィンドランナー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="orientation-screen">
      <div class="msg-box">
        <p>画面を横にしてね！</p>
        <div class="rotate-icon">🔄</div>
      </div>
    </div>

    <div id="game-wrapper">
      <div id="game-container">
        <canvas id="gameCanvas" width="800" height="450"></canvas>

        <div
          id="ui-layer"
          class="absolute inset-0 pointer-events-none text-[#5E3A21]"
        >
          <div
            class="absolute top-4 left-4 bg-white/95 px-4 py-2 rounded-2xl shadow-md border-2 border-[#FDE047]"
          >
            <p class="text-[10px] font-black opacity-60">SCORE</p>
            <p id="scoreVal" class="text-2xl font-black text-orange-600 leading-none">0</p>
          </div>

          <div
            class="absolute top-4 right-4 bg-white/95 px-4 py-2 rounded-2xl shadow-md border-2 border-[#FDE047]"
          >
            <p class="text-[10px] font-black opacity-60 text-right">BEST</p>
            <p id="bestVal" class="text-xl font-black text-orange-400 text-right leading-none">0</p>
          </div>

          <div
            id="title-screen"
            class="interactive absolute inset-0 flex flex-col items-center justify-center bg-[#FFFDEB] pointer-events-auto z-[200]"
          >
            <p class="absolute top-4 right-4 text-sm font-bold text-[#5E3A21]/60">
              Ver1.1
            </p>

            <div
              class="float-anim mb-4 bg-white p-6 rounded-[3rem] shadow-xl border-4 border-[#5E3A21] flex items-center justify-center"
            >
              <img
                src="assets/image/purin_login.png"
                alt="ポムポムプリン"
                width="200"
                height="200"
                class="object-contain"
              />
            </div>
            <h1 class="text-4xl font-black mb-6 text-center text-shadow-premium leading-tight">
              ポムポムプリン<br />ウィンドランナー
            </h1>
            <button
              id="start-btn"
              class="bg-[#FDE047] text-[#5E3A21] font-black py-4 px-12 rounded-full text-2xl shadow-[0_8px_0_#CA8A04] active:translate-y-1 active:shadow-none transition-all border-4 border-[#5E3A21]"
            >
              あそぶ！
            </button>
          </div>

          <div
            id="gameover-screen"
            class="interactive absolute inset-0 flex flex-col items-center justify-center bg-black/60 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-500 z-[250] hidden"
          >
            <div
              class="bg-white p-8 rounded-[3rem] shadow-2xl text-center border-4 border-[#5E3A21] w-10/12 max-w-md"
            >
              <h2 id="gameover-title" class="text-3xl font-black mb-2 text-red-500">
                ゲームオーバー
              </h2>
              <img
                id="gameover-img"
                src="assets/image/purin_gameover.png"
                alt="リザルト画像"
                class="w-[250px] h-auto mx-auto mb-4"
              />
              <p class="text-gray-500 font-bold mb-1">SCORE</p>
              <p id="finalScore" class="text-6xl font-black text-orange-500 mb-6 leading-none">0</p>
              <button
                id="retry-btn"
                class="bg-[#FDE047] text-[#5E3A21] font-black py-4 px-10 rounded-full text-xl shadow-[0_6px_0_#CA8A04] w-full border-4 border-[#5E3A21] active:translate-y-1 active:shadow-none transition-all"
              >
                もういっかい！
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
